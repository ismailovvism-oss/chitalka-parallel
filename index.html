<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#b07a2c">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Параллельная читалка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri&family=Literata&family=Noto+Naskh+Arabic&family=Noto+Sans+Arabic&family=PT+Sans&family=PT+Serif&family=Scheherazade+New&display=swap">
<link rel="stylesheet" href="style.css">
</head>
<body data-theme="light" data-layout="v" data-view="library">

<header id="topbar">
  <button id="btn-home" type="button" title="Все книги">📚</button>
  <button id="btn-toc" type="button" title="Оглавление">☰</button>
  <button id="btn-search" type="button" title="Поиск по книге">🔍</button>
  <button id="btn-bookmark" type="button" title="Закладка на текущем месте">🔖</button>
  <div id="chapter-title">Загрузка…</div>
  <button id="btn-warn" type="button" title="Ошибки контракта" hidden>⚠</button>
  <button id="btn-vis" type="button" title="Видимость языков">⇅</button>
  <button id="btn-settings" type="button" title="Настройки">⚙</button>
</header>
<div id="progress"><i></i></div>

<main id="stream"></main>

<footer id="bottombar">
  <button id="btn-prev" type="button" title="Предыдущая глава">‹</button>
  <button id="page-indicator" type="button" title="Перейти к странице">стр. —</button>
  <button id="btn-scan" type="button" title="Показать скан страницы" hidden>скан</button>
  <button id="btn-next" type="button" title="Следующая глава">›</button>
</footer>

<div id="page-popover" hidden>
  <form id="page-form">
    <input id="page-input" type="number" min="1" inputmode="numeric" placeholder="№ страницы">
    <button type="submit">Перейти</button>
  </form>
</div>

<div id="toc" class="overlay" hidden>
  <div class="sheet">
    <h2 id="toc-book-title"></h2>
    <section id="bm-section" hidden>
      <h3 class="sheet-sub">Закладки</h3>
      <ul id="bm-list"></ul>
    </section>
    <h3 class="sheet-sub" id="toc-chapters-head">Главы</h3>
    <ul id="toc-list"></ul>
  </div>
</div>

<div id="settings" class="overlay" hidden>
  <div class="sheet">
    <h2>Настройки</h2>
    <label>Тема
      <select id="set-theme">
        <option value="light">светлая</option>
        <option value="sepia">сепия</option>
        <option value="dark">тёмная</option>
      </select>
    </label>
    <label>Раскладка пары
      <select id="set-layout">
        <option value="auto">по ориентации экрана</option>
        <option value="v">вертикальная</option>
        <option value="h">две колонки</option>
      </select>
    </label>
    <label>Сноски
      <select id="set-fnmode">
        <option value="inline">разворот на месте</option>
        <option value="jump">скачок и возврат</option>
      </select>
    </label>
    <label>Порядок пары
      <select id="set-order">
        <option value="0">оригинал первым</option>
        <option value="1">перевод первым</option>
      </select>
    </label>
    <div id="set-fonts"></div>
    <label class="row">Режим проверки (валидатор)
      <input id="set-debug" type="checkbox">
    </label>
  </div>
</div>

<div id="search" class="overlay" hidden>
  <div class="sheet">
    <form id="search-form">
      <input id="search-input" type="search" placeholder="Поиск по книге…" autocomplete="off" enterkeyhint="search">
      <button type="submit" id="search-go">Найти</button>
    </form>
    <div id="search-results"></div>
  </div>
</div>

<div id="debug-panel" hidden></div>

<div id="img-overlay" hidden><img id="img-scan" alt="Скан страницы"></div>

<script src="parser.js"></script>
<script src="app.js"></script>
</body>
</html>
